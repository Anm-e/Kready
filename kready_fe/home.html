<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestione Atleti Kready</title>
    <style>
      :root {
        --primary: #007bff;
        --secondary: #6c757d;
        --success: #28a745;
        --dark: #333;
        --light: #f4f7f6;
        --white: #ffffff;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 30px;
        background-color: var(--light);
        color: var(--dark);
      }

      .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .btn-group {
        display: flex;
        gap: 10px;
      }

      button {
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: opacity 0.2s;
        padding: 10px 20px;
      }

      button.btn-add {
        background-color: var(--success);
        color: white;
      }
      button.btn-credit {
        background-color: var(--primary);
        color: white;
      }
      button:hover {
        opacity: 0.9;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--white);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        overflow: hidden;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }

      th {
        background-color: var(--primary);
        color: white;
        font-weight: 600;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(3px);
      }

      .modal-content {
        background: var(--white);
        margin: 2% auto;
        padding: 25px;
        border-radius: 12px;
        width: 90%;
        max-width: 750px;
        max-height: 90vh;
        overflow-y: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .close-btn {
        position: absolute;
        right: 20px;
        top: 15px;
        font-size: 24px;
        cursor: pointer;
        color: #888;
        z-index: 10;
      }

      .table-container {
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid #eee;
        border-radius: 4px;
        margin-bottom: 15px;
      }

      .modal-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      .modal-table th {
        background-color: var(--secondary);
        position: sticky;
        top: 0;
        padding: 8px;
        z-index: 1;
      }

      .modal-table td {
        padding: 8px;
        background: white;
      }

      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 14px;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      .btn-submit {
        width: 100%;
        background: var(--primary);
        color: white;
        padding: 12px;
        font-size: 16px;
        margin-top: 10px;
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        flex-shrink: 0;
      }

      h4 {
        border-left: 4px solid var(--primary);
        padding-left: 10px;
        margin: 15px 0 10px;
        color: var(--dark);
        flex-shrink: 0;
      }

      .btn-view {
        background: none;
        color: var(--primary);
        font-size: 1.2rem;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div class="header-actions">
      <h2>Registro Atleti</h2>
      <div class="btn-group">
        <button class="btn-credit" onclick="apriModaleCredito()">
          + Crea Credito
        </button>
        <button class="btn-add" onclick="apriModale('addModal')">
          + Aggiungi Atleta
        </button>
      </div>
    </div>

    <table id="athleteTable">
      <thead>
        <tr>
          <th>Atleta</th>
          <th>Grado</th>
          <th>Crediti attuali</th>
          <th style="width: 80px; text-align: center">Dettagli</th>
        </tr>
      </thead>
      <tbody id="athleteBody"></tbody>
    </table>

    <div id="addModal" class="modal">
      <div class="modal-content" style="overflow-y: auto">
        <span class="close-btn" onclick="chiudiModale('addModal')"
          >&times;</span
        >
        <h3>Nuovo Atleta</h3>
        <form id="addAthleteForm">
          <div class="form-group">
            <label>Nome</label><input type="text" id="name" required />
          </div>
          <div class="form-group">
            <label>Cognome</label><input type="text" id="surname" required />
          </div>
          <div class="form-group">
            <label>Data di Nascita</label
            ><input type="date" id="birthday" required />
          </div>
          <div class="form-group">
            <label>Genere</label>
            <select id="gender">
              <option value="M">Maschio</option>
              <option value="F">Femmina</option>
            </select>
          </div>
          <div class="form-group">
            <label>Data Inizio</label
            ><input type="date" id="startDate" required />
          </div>
          <button type="submit" class="btn-submit">Salva Atleta</button>
        </form>
      </div>
    </div>

    <div id="detailModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="chiudiModale('detailModal')"
          >&times;</span
        >
        <h3 id="m-full-name">Dettagli Atleta</h3>
        <div class="info-grid">
          <div>
            <strong>Data Nascita:</strong> <span id="m-birthday"></span>
          </div>
          <div><strong>Inizio:</strong> <span id="m-startDate"></span></div>
          <div><strong>Grado Attuale:</strong> <span id="m-grade"></span></div>
          <div>
            <strong>Totale Crediti:</strong> <span id="m-totalCredits"></span>
          </div>
        </div>
        <h4>Storico Gradi</h4>
        <div class="table-container">
          <table class="modal-table">
            <thead>
              <tr>
                <th>Grado</th>
                <th>Data Conseguimento</th>
              </tr>
            </thead>
            <tbody id="m-previousGrades"></tbody>
          </table>
        </div>
        <h4>Dettaglio Crediti</h4>
        <div class="table-container">
          <table class="modal-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Tipo Attività</th>
                <th>Crediti</th>
              </tr>
            </thead>
            <tbody id="m-creditsList"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="creditModal" class="modal">
      <div class="modal-content" style="overflow-y: auto">
        <span class="close-btn" onclick="chiudiModale('creditModal')"
          >&times;</span
        >
        <h3>Registra Nuovo Credito</h3>
        <form id="addCreditForm">
          <div class="form-group">
            <label>Data Attività</label
            ><input type="date" id="c-date" required />
          </div>
          <div class="form-group">
            <label>Luogo / Evento</label
            ><input type="text" id="c-place" required />
          </div>
          <div class="form-group">
            <label>Tipo di Credito</label>
            <select id="c-type" required>
              <option value="">Caricamento tipi...</option>
            </select>
          </div>
          <button type="submit" class="btn-submit">Invia Credito</button>
        </form>
      </div>
    </div>

    <script>
      const BASE_URL = "http://localhost:8081";
      const API_URL = `${BASE_URL}/athlete`;
      const CREDIT_URL = `${BASE_URL}/credit`;
      const TYPES_URL = `${BASE_URL}/credit/type`;

      // --- FUNZIONE DI FORMATTAZIONE DATA ---
      function formattaData(stringaData) {
        if (!stringaData) return "-";
        const opzioni = { day: "numeric", month: "short", year: "numeric" };
        return new Date(stringaData)
          .toLocaleDateString("it-IT", opzioni)
          .replace(".", "");
      }

      async function caricaAtleti() {
        try {
          const r = await fetch(API_URL);
          const data = await r.json();
          document.getElementById("athleteBody").innerHTML = data
            .map(
              (a) => `
            <tr>
              <td>${a.name || "N/A"}</td>
              <td>${a.grade || "-"}</td>
              <td>${a.credits || 0}</td>
              <td style="text-align: center;">
                <button class="btn-view" onclick="mostraDettagli(${a.id})">👁</button>
              </td>
            </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function mostraDettagli(id) {
        try {
          const r = await fetch(`${API_URL}/${id}`);
          const a = await r.json();

          document.getElementById("m-full-name").innerText = a.surname
            ? `${a.name} ${a.surname}`
            : a.name;
          // Formattazione date nei dettagli
          document.getElementById("m-birthday").innerText = formattaData(
            a.birthday,
          );
          document.getElementById("m-startDate").innerText = formattaData(
            a.startDate,
          );
          document.getElementById("m-grade").innerText = a.grade || "-";
          document.getElementById("m-totalCredits").innerText =
            a.totalCredits || 0;

          document.getElementById("m-previousGrades").innerHTML = a
            .previousGrades?.length
            ? a.previousGrades
                .map(
                  (pg) =>
                    `<tr><td>${pg.grade}</td><td>${formattaData(pg.achievementDate)}</td></tr>`,
                )
                .join("")
            : '<tr><td colspan="2" style="text-align:center">Nessuno storico</td></tr>';

          document.getElementById("m-creditsList").innerHTML = a.credits?.length
            ? a.credits
                .map(
                  (c) =>
                    `<tr><td>${formattaData(c.date)}</td><td>${c.type}</td><td><strong>+${c.credits}</strong></td></tr>`,
                )
                .join("")
            : '<tr><td colspan="3" style="text-align:center">Nessun credito</td></tr>';

          apriModale("detailModal");
        } catch (e) {
          console.error(e);
        }
      }

      document
        .getElementById("addAthleteForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const nuovo = {
            name: document.getElementById("name").value,
            surname: document.getElementById("surname").value,
            birthday: document.getElementById("birthday").value,
            gender: document.getElementById("gender").value,
            startDate: document.getElementById("startDate").value,
          };
          await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nuovo),
          });
          chiudiModale("addModal");
          caricaAtleti();
        });

      async function apriModaleCredito() {
        apriModale("creditModal");
        const select = document.getElementById("c-type");
        document.getElementById("c-date").valueAsDate = new Date();
        const r = await fetch(TYPES_URL);
        const tipi = await r.json();
        select.innerHTML = tipi
          .map(
            (t) =>
              `<option value="${t.id}">${t.type} (${t.creditValue} pt)</option>`,
          )
          .join("");
      }

      document
        .getElementById("addCreditForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const body = {
            date: document.getElementById("c-date").value,
            place: document.getElementById("c-place").value,
            creditType: parseInt(document.getElementById("c-type").value),
          };
          const res = await fetch(CREDIT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            chiudiModale("creditModal");
            caricaAtleti();
          }
        });

      function apriModale(id) {
        document.getElementById(id).style.display = "block";
      }
      function chiudiModale(id) {
        document.getElementById(id).style.display = "none";
      }
      window.onclick = (e) => {
        if (e.target.className === "modal") e.target.style.display = "none";
      };
      document.addEventListener("DOMContentLoaded", caricaAtleti);
    </script>
  </body>
</html>
